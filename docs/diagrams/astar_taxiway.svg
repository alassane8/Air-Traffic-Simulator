<svg viewBox="0 0 720 320" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="13">

  <rect width="720" height="320" fill="#0d1117" rx="10"/>

  <text x="30" y="28" fill="#e6edf3" font-size="15" font-weight="bold">Pathfinding taxiway — Algorithme A*</text>

  <!-- ── LEFT: graph visual ── -->

  <!-- Taxiway edges (gray) -->
  <line x1="80"  y1="240" x2="160" y2="200" stroke="#30363d" stroke-width="2"/>
  <line x1="80"  y1="240" x2="80"  y2="160" stroke="#30363d" stroke-width="2"/>
  <line x1="80"  y1="160" x2="160" y2="200" stroke="#30363d" stroke-width="2"/>
  <line x1="80"  y1="160" x2="160" y2="120" stroke="#30363d" stroke-width="2"/>
  <line x1="160" y1="200" x2="240" y2="200" stroke="#30363d" stroke-width="2"/>
  <line x1="160" y1="120" x2="240" y2="120" stroke="#30363d" stroke-width="2"/>
  <line x1="160" y1="200" x2="160" y2="120" stroke="#30363d" stroke-width="2"/>
  <line x1="240" y1="200" x2="240" y2="120" stroke="#30363d" stroke-width="2"/>
  <line x1="240" y1="120" x2="320" y2="120" stroke="#30363d" stroke-width="2"/>
  <line x1="240" y1="200" x2="320" y2="200" stroke="#30363d" stroke-width="2"/>
  <line x1="320" y1="120" x2="320" y2="200" stroke="#30363d" stroke-width="2"/>

  <!-- Optimal path (highlighted) -->
  <line x1="80"  y1="240" x2="80"  y2="160" stroke="#3fb950" stroke-width="3"/>
  <line x1="80"  y1="160" x2="160" y2="120" stroke="#3fb950" stroke-width="3"/>
  <line x1="160" y1="120" x2="240" y2="120" stroke="#3fb950" stroke-width="3"/>
  <line x1="240" y1="120" x2="320" y2="120" stroke="#3fb950" stroke-width="3"/>

  <!-- Heuristic line (dashed, gate to runway) -->
  <line x1="80" y1="240" x2="320" y2="120" stroke="#ffa657" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Nodes -->
  <!-- Gate (start) -->
  <circle cx="80" cy="240" r="10" fill="#1f6feb" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="80" y="244" fill="white" font-size="10" text-anchor="middle">G</text>

  <!-- Intersections -->
  <circle cx="80"  cy="160" r="7" fill="#21262d" stroke="#3fb950" stroke-width="1.5"/>
  <circle cx="160" cy="200" r="7" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <circle cx="160" cy="120" r="7" fill="#21262d" stroke="#3fb950" stroke-width="1.5"/>
  <circle cx="240" cy="200" r="7" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <circle cx="240" cy="120" r="7" fill="#21262d" stroke="#3fb950" stroke-width="1.5"/>
  <circle cx="320" cy="200" r="7" fill="#21262d" stroke="#30363d" stroke-width="1"/>

  <!-- Runway threshold (goal) -->
  <rect x="312" y="108" width="16" height="24" rx="3" fill="#f85149" stroke="#ff7b72" stroke-width="1.5"/>
  <text x="320" y="124" fill="white" font-size="9" text-anchor="middle">R</text>

  <!-- f(n) annotations on path -->
  <text x="55"  y="195" fill="#3fb950" font-size="9">g=120</text>
  <text x="88"  y="132" fill="#3fb950" font-size="9">g=340</text>
  <text x="188" y="108" fill="#3fb950" font-size="9">g=520</text>
  <text x="255" y="108" fill="#3fb950" font-size="9">g=690</text>

  <!-- Heuristic label -->
  <text x="200" y="198" fill="#ffa657" font-size="10">h(n) = haversine</text>
  <text x="200" y="211" fill="#ffa657" font-size="10">(à vol d'oiseau)</text>

  <!-- Labels -->
  <text x="55"  y="252" fill="#58a6ff" font-size="11">Gate</text>
  <text x="325" y="108" fill="#f85149" font-size="11">Piste</text>

  <!-- Legend -->
  <line x1="30" y1="285" x2="60" y2="285" stroke="#3fb950" stroke-width="3"/>
  <text x="66" y="289" fill="#8b949e" font-size="11">Chemin optimal A*  (g(n) cumulé)</text>
  <line x1="30" y1="300" x2="60" y2="300" stroke="#ffa657" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="66" y="304" fill="#8b949e" font-size="11">Heuristique h(n)  (haversine admissible)</text>

  <!-- ── RIGHT: formula box ── -->
  <rect x="380" y="42" width="320" height="80" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="396" y="62"  fill="#e6edf3" font-size="12" font-weight="bold">Fonction de coût A*</text>
  <text x="396" y="82"  fill="#79c0ff" font-size="12">f(n) = g(n) + h(n)</text>
  <text x="396" y="100" fill="#8b949e" font-size="11">g(n) = distance parcourue depuis la gate</text>
  <text x="396" y="114" fill="#8b949e" font-size="11">h(n) = haversine(n, piste)  [admissible ≤ réel]</text>

  <!-- Why admissible -->
  <rect x="380" y="138" width="320" height="60" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="396" y="158" fill="#e6edf3" font-size="12" font-weight="bold">Admissibilité de h</text>
  <text x="396" y="176" fill="#8b949e" font-size="11">haversine = distance à vol d'oiseau</text>
  <text x="396" y="192" fill="#3fb950" font-size="11">≤ distance réelle sur les taxiways  ✓</text>

  <!-- Complexity -->
  <rect x="380" y="214" width="320" height="44" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="396" y="234" fill="#e6edf3" font-size="12" font-weight="bold">Complexité</text>
  <text x="396" y="252" fill="#8b949e" font-size="11">O((V + E) log V)  avec tas binaire (heapq)</text>

  <!-- Graph structure -->
  <rect x="380" y="274" width="320" height="34" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="396" y="291" fill="#8b949e" font-size="11">Nœuds : gates, intersections, seuils de piste</text>
  <text x="396" y="304" fill="#8b949e" font-size="11">Arêtes : segments taxiway bidirectionnels (m)</text>

</svg>

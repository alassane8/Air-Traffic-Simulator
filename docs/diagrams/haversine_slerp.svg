<svg viewBox="0 0 720 360" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="13">

  <rect width="720" height="360" fill="#0d1117" rx="10"/>

  <text x="30" y="28" fill="#e6edf3" font-size="15" font-weight="bold">Navigation sphérique — Haversine &amp; Slerp géodésique</text>

  <!-- Globe circle -->
  <circle cx="190" cy="195" r="130" fill="#0d1520" stroke="#30363d" stroke-width="1.2"/>

  <!-- Equator -->
  <ellipse cx="190" cy="195" rx="130" ry="28" fill="none" stroke="#21262d" stroke-width="0.8" stroke-dasharray="3 3"/>

  <!-- Meridian -->
  <ellipse cx="190" cy="195" rx="28" ry="130" fill="none" stroke="#21262d" stroke-width="0.8" stroke-dasharray="3 3"/>

  <!-- Great circle arc CDG → JFK (approximate) -->
  <!-- CDG: lat 49°N lon 2.5°E  → on sphere projection approx (205, 92) -->
  <!-- JFK: lat 40.7°N lon -73.8°E → approx (105, 112) -->
  <!-- Arc going northward (great circle curves north) via ~(175, 72) -->
  <path d="M205,92 Q175,55 105,112"
        fill="none" stroke="#3b82f6" stroke-width="2.5"/>

  <!-- Rhumb line (straight chord) -->
  <line x1="205" y1="92" x2="105" y2="112" stroke="#8b949e" stroke-width="1.2" stroke-dasharray="4 3"/>

  <!-- Points -->
  <circle cx="205" cy="92"  r="5" fill="#ffa657"/>
  <circle cx="105" cy="112" r="5" fill="#f85149"/>

  <!-- Labels -->
  <text x="214" y="90"  fill="#ffa657" font-size="11">CDG (φ₁, λ₁)</text>
  <text x="60"  y="112" fill="#f85149" font-size="11">JFK (φ₂, λ₂)</text>

  <!-- Midpoint on great circle -->
  <circle cx="157" cy="66" r="3" fill="#3fb950"/>
  <text x="163" y="65" fill="#3fb950" font-size="10">position(f)</text>

  <!-- Center of Earth -->
  <circle cx="190" cy="195" r="3" fill="#8b949e"/>
  <!-- Radius lines to points -->
  <line x1="190" y1="195" x2="205" y2="92"  stroke="#30363d" stroke-width="0.8" stroke-dasharray="2 2"/>
  <line x1="190" y1="195" x2="105" y2="112" stroke="#30363d" stroke-width="0.8" stroke-dasharray="2 2"/>
  <!-- Central angle arc -->
  <path d="M198,147 Q200,143 197,140" fill="none" stroke="#d2a8ff" stroke-width="1.2"/>
  <text x="202" y="145" fill="#d2a8ff" font-size="10">δ</text>

  <!-- Legend below globe -->
  <line x1="60" y1="338" x2="90" y2="338" stroke="#3b82f6" stroke-width="2.5"/>
  <text x="96" y="342" fill="#8b949e" font-size="11">Grand cercle (orthodromie)</text>
  <line x1="60" y1="352" x2="90" y2="352" stroke="#8b949e" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="96" y="356" fill="#8b949e" font-size="11">Loxodromie (ligne droite carte)</text>

  <!-- Right: formulas -->
  <!-- Haversine -->
  <rect x="380" y="42" width="325" height="100" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="396" y="62" fill="#e6edf3" font-size="12" font-weight="bold">Formule de Haversine</text>
  <text x="396" y="82" fill="#79c0ff" font-size="11">a = sin²(Δφ/2) + cosφ₁·cosφ₂·sin²(Δλ/2)</text>
  <text x="396" y="100" fill="#79c0ff" font-size="11">d = 2 R⊕ arcsin(√a)</text>
  <text x="396" y="118" fill="#8b949e" font-size="11">R⊕ = 6 371 km  |  a clampé dans [0, 1]</text>
  <text x="396" y="134" fill="#ffa657" font-size="11">→ distance orthodromique entre 2 waypoints</text>

  <!-- Slerp -->
  <rect x="380" y="158" width="325" height="130" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="396" y="178" fill="#e6edf3" font-size="12" font-weight="bold">Interpolation Slerp (propagation)</text>
  <text x="396" y="198" fill="#8b949e" font-size="11">f = v_km/s × Δt_sim / d   (fraction parcourue / tick)</text>
  <text x="396" y="218" fill="#79c0ff" font-size="11">A = sin((1−f)·δ) / sin(δ)</text>
  <text x="396" y="234" fill="#79c0ff" font-size="11">B = sin(f·δ)    / sin(δ)</text>
  <text x="396" y="252" fill="#8b949e" font-size="11">pos = A·P₁_ecef + B·P₂_ecef  (coordonnées 3D)</text>
  <text x="396" y="270" fill="#3fb950" font-size="11">→ avion reste exactement sur le grand cercle</text>

  <!-- Position formula -->
  <rect x="380" y="304" width="325" height="44" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="396" y="322" fill="#8b949e" font-size="11">Retour géo :  φ = atan2(z, √(x²+y²))</text>
  <text x="396" y="340" fill="#8b949e" font-size="11">             λ = atan2(y, x)</text>

</svg>

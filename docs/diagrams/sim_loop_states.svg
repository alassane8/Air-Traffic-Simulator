<svg viewBox="0 0 760 340" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="13">

  <rect width="760" height="340" fill="#0d1117" rx="10"/>

  <text x="30" y="28" fill="#e6edf3" font-size="15" font-weight="bold">Boucle de simulation &amp; cycle d'états d'un vol</text>

  <!-- ── LEFT: tick loop (box width=310 to fit text) ── -->
  <text x="30" y="55" fill="#8b949e" font-size="12">Boucle principale  (TIME_SCALE = 20×)</text>

  <!-- Tick box -->
  <rect x="30" y="65" width="310" height="36" rx="6" fill="#161b22" stroke="#1f6feb" stroke-width="1"/>
  <text x="46" y="80" fill="#58a6ff" font-size="11">Δt_réel = 1 s  →  Δt_sim = 1 × 20 = 20 s</text>
  <text x="46" y="94" fill="#8b949e" font-size="10">1 tick = 1 s réel = 20 s simulés</text>

  <line x1="185" y1="101" x2="185" y2="118" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="185,122 181,114 189,114" fill="#30363d"/>

  <!-- Step 1 — 310px wide -->
  <rect x="30" y="122" width="310" height="30" rx="4" fill="#1f2d1f" stroke="#3fb950" stroke-width="0.8"/>
  <text x="46" y="142" fill="#3fb950" font-size="11">① _tick_runway()  — PLANNED → TAKEOFF</text>

  <line x1="185" y1="152" x2="185" y2="162" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="185,166 181,158 189,158" fill="#30363d"/>

  <!-- Step 2 — 310px wide -->
  <rect x="30" y="166" width="310" height="30" rx="4" fill="#2d2516" stroke="#ffa657" stroke-width="0.8"/>
  <text x="46" y="182" fill="#ffa657" font-size="11">② _tick_flight()   — CLIMBING → DESCENDING</text>

  <line x1="185" y1="196" x2="185" y2="206" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="185,210 181,202 189,202" fill="#30363d"/>

  <!-- Step 3 — 310px wide -->
  <rect x="30" y="210" width="310" height="30" rx="4" fill="#2d1f2d" stroke="#d2a8ff" stroke-width="0.8"/>
  <text x="46" y="226" fill="#d2a8ff" font-size="11">③ _tick_landing()  — descente, taxi,</text>
  <text x="46" y="238" fill="#d2a8ff" font-size="11">   turnaround</text>

  <line x1="185" y1="240" x2="185" y2="250" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="185,254 181,246 189,246" fill="#30363d"/>

  <!-- Step 4 -->
  <rect x="30" y="254" width="310" height="30" rx="4" fill="#0d1520" stroke="#58a6ff" stroke-width="0.8"/>
  <text x="46" y="274" fill="#58a6ff" font-size="11">④ visualizer.update() + draw()  — 60 fps</text>

  <!-- Params -->
  <rect x="30" y="298" width="310" height="30" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="46" y="310" fill="#8b949e" font-size="10">TICK_INTERVAL=1s  TIME_SCALE=20</text>
  <text x="46" y="323" fill="#8b949e" font-size="10">SIM_TICK=20s  FPS_TARGET=60</text>

  <!-- ── RIGHT: state machine ── -->
  <text x="390" y="55" fill="#8b949e" font-size="12">Cycle d'états d'un vol</text>

  <!-- Row 1: PLANNED → BOARDING → LINEUP -->
  <rect x="385" y="65" width="90" height="26" rx="13" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="430" y="83" fill="#8b949e" font-size="11" text-anchor="middle">PLANNED</text>

  <line x1="477" y1="78" x2="490" y2="78" stroke="#30363d" stroke-width="1.2"/>
  <polygon points="494,78 488,75 488,81" fill="#30363d"/>

  <rect x="494" y="65" width="90" height="26" rx="13" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="539" y="83" fill="#8b949e" font-size="11" text-anchor="middle">BOARDING</text>

  <line x1="586" y1="78" x2="599" y2="78" stroke="#30363d" stroke-width="1.2"/>
  <polygon points="603,78 597,75 597,81" fill="#30363d"/>

  <rect x="603" y="65" width="80" height="26" rx="13" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="643" y="83" fill="#8b949e" font-size="11" text-anchor="middle">LINEUP</text>

  <!-- Down to TAKEOFF -->
  <line x1="643" y1="91" x2="643" y2="118" stroke="#30363d" stroke-width="1.2"/>
  <polygon points="643,122 640,114 646,114" fill="#30363d"/>

  <!-- Row 2: CRUISE ← CLIMBING ← TAKEOFF -->
  <rect x="603" y="122" width="80" height="26" rx="13" fill="#2d1515" stroke="#f85149" stroke-width="1"/>
  <text x="643" y="140" fill="#f85149" font-size="11" text-anchor="middle">TAKEOFF</text>

  <line x1="601" y1="135" x2="588" y2="135" stroke="#f85149" stroke-width="1.2"/>
  <polygon points="584,135 592,132 592,138" fill="#f85149"/>

  <rect x="494" y="122" width="90" height="26" rx="13" fill="#2d2516" stroke="#ffa657" stroke-width="1"/>
  <text x="539" y="140" fill="#ffa657" font-size="11" text-anchor="middle">CLIMBING</text>

  <line x1="492" y1="135" x2="479" y2="135" stroke="#ffa657" stroke-width="1.2"/>
  <polygon points="475,135 483,132 483,138" fill="#ffa657"/>

  <rect x="385" y="122" width="90" height="26" rx="13" fill="#1f2d1f" stroke="#3fb950" stroke-width="1.5"/>
  <text x="430" y="140" fill="#3fb950" font-size="11" text-anchor="middle">CRUISE</text>

  <!-- Down to DESCENDING -->
  <line x1="430" y1="148" x2="430" y2="162" stroke="#3fb950" stroke-width="1.2"/>
  <polygon points="430,166 427,158 433,158" fill="#3fb950"/>

  <!-- Row 3: DESCENDING → LANDING → TAXI -->
  <rect x="385" y="166" width="90" height="26" rx="13" fill="#0d1520" stroke="#79c0ff" stroke-width="1"/>
  <text x="430" y="184" fill="#79c0ff" font-size="11" text-anchor="middle">DESCENDING</text>

  <line x1="477" y1="179" x2="490" y2="179" stroke="#79c0ff" stroke-width="1.2"/>
  <polygon points="494,179 488,176 488,182" fill="#79c0ff"/>

  <rect x="494" y="166" width="90" height="26" rx="13" fill="#1f1f2d" stroke="#d2a8ff" stroke-width="1"/>
  <text x="539" y="184" fill="#d2a8ff" font-size="11" text-anchor="middle">LANDING</text>

  <line x1="586" y1="179" x2="599" y2="179" stroke="#d2a8ff" stroke-width="1.2"/>
  <polygon points="603,179 597,176 597,182" fill="#d2a8ff"/>

  <rect x="603" y="166" width="80" height="26" rx="13" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="643" y="184" fill="#8b949e" font-size="11" text-anchor="middle">TAXI</text>

  <!-- Down to PARKED -->
  <line x1="643" y1="192" x2="643" y2="206" stroke="#30363d" stroke-width="1.2"/>
  <polygon points="643,210 640,202 646,202" fill="#30363d"/>

  <rect x="603" y="210" width="80" height="26" rx="13" fill="#21262d" stroke="#3fb950" stroke-width="0.8"/>
  <text x="643" y="228" fill="#3fb950" font-size="11" text-anchor="middle">PARKED ✓</text>

  <!-- Turnaround arrow back to PLANNED -->
  <path d="M603,223 Q540,278 430,278 Q405,278 405,258 L405,250"
        fill="none" stroke="#30363d" stroke-width="1" stroke-dasharray="3 3"/>
  <polygon points="405,246 402,254 408,254" fill="#30363d"/>
  <text x="500" y="276" fill="#30363d" font-size="10" text-anchor="middle">turnaround</text>

  <!-- Brackets -->
  <rect x="375" y="108" width="360" height="97" rx="4" fill="none" stroke="#ffa657" stroke-width="0.6" stroke-dasharray="4 3"/>
  <text x="381" y="107" fill="#ffa657" font-size="10">active_flights</text>

  <rect x="375" y="52" width="360" height="53" rx="4" fill="none" stroke="#58a6ff" stroke-width="0.6" stroke-dasharray="4 3"/>
  <text x="381" y="51" fill="#58a6ff" font-size="10">new_departures</text>

</svg>
